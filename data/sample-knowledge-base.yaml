  - id: principle-compound-interest
    type: principle
    title: "Compound Interest Principle"
    description: "Exponential growth through reinvestment of returns"
    source: "Mathematical principle, ancient origin"
    credibility_score: 100
    tags: [mathematics, finance, exponential]
    content: |
      Formula: A = P(1 + r)^t
      Where:
      - A = final amount
      - P = principal
      - r = interest rate
      - t = time

      The power comes from earning returns on previous returns, creating
      exponential rather than linear growth. This applies to any domain
      where outputs can be reinvested into inputs.

  - id: principle-socratic-ignorance
