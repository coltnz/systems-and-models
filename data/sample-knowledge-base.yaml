      - Optionality over prediction
      - Barbell strategy (extreme safety + extreme risk)
      - Via negativa (improve by removing)
      - Skin in the game
      - Embrace small failures to prevent catastrophic ones

      Applied in risk analysis, biology, engineering, aerospace, computer science.

  - id: concept-antifragility
