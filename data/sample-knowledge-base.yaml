      Framework helps identify strategic (important, not urgent)
      work vs reactive (urgent, not important) work.

  - id: quote-eisenhower-urgency
    type: quote
    title: "Eisenhower on Urgency vs Importance"
    description: "Distinguishing urgent from important"
    source: "Dwight D. Eisenhower (attributed)"
    credibility_score: 85
    tags: [eisenhower, productivity, prioritization]
    content: |
      "What is important is seldom urgent and what is urgent is seldom important."

      Also attributed: "I have two kinds of problems: the urgent and the
      important. The urgent are not important, and the important are never urgent."

      Foundation for prioritization matrix bearing his name.

