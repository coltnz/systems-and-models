systems:
  - id: system-structured-interviews
    title: "Structured Interview Process"
    description: "Standardized hiring methodology with consistent evaluation"
    status: proven
    tags: [hiring, interviews, HR, talent]
    content: |
      ## Process
      1. Define role competencies and success criteria
      2. Create standardized question bank targeting competencies
      3. Develop scoring rubric (1-5 scale per competency)
      4. Train all interviewers on questions and rubric
      5. Conduct interviews asking same questions in same order
      6. Score candidates independently immediately after interview
      7. Aggregate scores and discuss discrepancies
      8. Make data-driven hiring decision

      ## Key Practices
      - Use behavioral questions ("Tell me about a time...")
      - Avoid hypothetical questions ("What would you do if...")
      - Take detailed notes during interview
      - Calibrate scoring across interviewers
    evidence_links:
      - research-schmidt-hunter-validity
      - fact-google-structured-interviews

  - id: system-gtd
    title: "Getting Things Done (GTD)"
    description: "David Allen's productivity system for stress-free execution"
    status: proven
    tags: [productivity, organization, workflow]
    content: |
      ## The Five Steps
      1. **Capture**: Collect everything that has your attention
      2. **Clarify**: Process what each item means and what to do
      3. **Organize**: Put it where it belongs
      4. **Reflect**: Review frequently
      5. **Engage**: Simply do

      ## Key Concepts
      - Two-minute rule: If it takes <2 min, do it now
      - Next actions: Define specific, physical next step
      - Waiting for: Track delegated items
      - Someday/maybe: Parking lot for future ideas
      - Weekly review: Critical for system maintenance
    evidence_links:
      - fact-gtd-adoption
      - principle-cognitive-load

  - id: system-pomodoro
    title: "Pomodoro Technique"
    description: "Time management using 25-minute focused intervals"
    status: proven
    tags: [productivity, focus, time-management]
    content: |
      ## Steps
      1. Choose task to work on
      2. Set timer for 25 minutes (one "pomodoro")
      3. Work with complete focus until timer rings
      4. Take 5-minute break
      5. After 4 pomodoros, take longer 15-30 minute break

      ## Rules
      - No interruptions during pomodoro
      - If urgent interruption, end pomodoro
      - Track completed pomodoros
      - Don't check email/messages during focus time
    evidence_links:
      - research-timeboxing-effectiveness
      - theory-flow-state

  - id: system-compounding-5-3-1
    title: "Compound Interest Calculator (5/3/1)"
    description: "Simple framework for understanding investment returns"
    status: active
    tags: [investing, finance, compounding]
    content: |
      ## Formula
      Every 5% annual return becomes 3x in 25 years, 1% in 1 year

      ## Application
      - 5% → doubles in 14 years
      - 10% → doubles in 7 years
      - 15% → doubles in 5 years

      ## Key Insight
      Small differences in return rates create massive differences
      over time due to compounding. A 7% vs 10% return over 30 years
      is the difference between 7.6x and 17.4x returns.
    evidence_links:
      - principle-compound-interest
      - quote-einstein-compounding

  - id: system-ai-alignment-protocol
    title: "AI Alignment Safety Protocol"
    description: "Framework for ensuring AI systems align with human values"
    status: active
    tags: [AI, safety, alignment, RICE]
    content: |
      ## RICE Framework
      1. **Robustness**: System performs reliably under distribution shift
      2. **Interpretability**: Decisions are understandable to humans
      3. **Controllability**: Humans can intervene and override
      4. **Ethicality**: Actions align with human values and norms

      ## Key Practices
      - Red-teaming for adversarial testing
      - Constitutional AI for value learning
      - Oversight mechanisms and kill switches
      - Continuous monitoring for goal drift
      - Human-in-the-loop for critical decisions
    evidence_links:
      - research-ai-alignment-survey
      - research-ai-alignment-deep-learning

  - id: system-circular-economy-implementation
    title: "Circular Economy Business Model"
    description: "Ellen MacArthur Foundation's framework for sustainable business"
    status: active
    tags: [sustainability, circular-economy, environment, business]
    content: |
      ## Three Core Principles
      1. **Eliminate waste and pollution** - Design products for circularity
      2. **Circulate products and materials** - Keep at highest value
      3. **Regenerate nature** - Return biological materials to earth

      ## Implementation Steps
      1. Map material flows and identify waste
      2. Redesign products for durability, repair, reuse
      3. Establish take-back and refurbishment programs
      4. Create secondary markets for used materials
      5. Measure success via material retention, not just revenue
    evidence_links:
      - framework-circular-economy-emf
      - research-circular-economy-impact

  - id: system-esg-investment-screening
    title: "ESG Investment Screening Process"
    description: "Framework for sustainable finance decision-making"
    status: active
    tags: [ESG, investing, sustainability, finance]
    content: |
      ## ESG Criteria
      - **Environmental**: Carbon footprint, waste, resource use
      - **Social**: Labor practices, diversity, community impact
      - **Governance**: Board structure, ethics, transparency

      ## Screening Process
      1. Negative screening: Exclude harmful industries
      2. Positive screening: Favor ESG leaders
      3. ESG integration: Incorporate into financial analysis
      4. Impact measurement: Track outcomes beyond returns
      5. Engagement: Push companies toward improvement
    evidence_links:
      - research-esg-performance
      - framework-un-pri

  - id: system-hybrid-work-policy
    title: "Evidence-Based Hybrid Work Policy"
    description: "Stanford-tested 3-day hybrid work framework"
    status: proven
    tags: [remote-work, hybrid, productivity, retention]
    content: |
      ## Core Model
      2-3 days remote, 2-3 days in office per week

      ## Key Findings
      - Zero impact on productivity
      - Zero impact on promotion rates
      - 33% reduction in attrition
      - Improved work-life balance
      - $20k savings per prevented resignation

      ## Implementation
      1. Employee choice on which days remote
      2. Team coordination for in-person collaboration days
      3. Clear communication expectations
      4. Equip home offices properly
      5. Measure outcomes, not hours
    evidence_links:
      - research-stanford-hybrid-work
      - research-bloom-remote-work

  - id: system-digital-declutter
    title: "Digital Declutter Process"
    description: "Cal Newport's 30-day digital minimalism reset"
    status: proven
    tags: [digital-minimalism, focus, attention, technology]
    content: |
      ## 30-Day Process
      1. **Take break** from optional technologies
      2. **Rediscover** offline activities that matter
      3. **Reintroduce** technology selectively and intentionally

      ## Guidelines
      - Define your values first
      - Technology must strongly support values
      - Optimize how you use reintroduced tech
      - Ban mindless scrolling and checking

      ## Expected Outcomes
      - More time for deep work
      - Improved focus and attention
      - Better relationships
      - Reduced anxiety and FOMO
    evidence_links:
      - book-digital-minimalism-newport
      - research-attention-economy

  - id: system-deliberate-practice-training
    title: "Deliberate Practice Training System"
    description: "Ericsson's framework for developing expertise"
    status: proven
    tags: [expertise, practice, mastery, performance]
    content: |
      ## Core Elements
      1. **Specific goals**: Target particular aspects of performance
      2. **Focused attention**: Complete concentration on task
      3. **Immediate feedback**: Know what's working and what isn't
      4. **Discomfort**: Push beyond current abilities consistently

      ## Implementation
      1. Break skill into components
      2. Work on weakest component
      3. Get expert feedback or use objective measures
      4. Repeat with intense focus
      5. Rest and consolidate learning

      ## Not Deliberate Practice
      - Mindless repetition
      - Staying in comfort zone
      - Lack of specific goals
      - No feedback mechanism
    evidence_links:
      - research-ericsson-deliberate-practice
      - book-peak-ericsson

  - id: system-jobs-to-be-done-research
    title: "Jobs-to-be-Done Interview Process"
    description: "Christensen's framework for understanding customer motivation"
    status: proven
    tags: [innovation, customer-research, JTBD, product]
    content: |
      ## Core Question
      "What job are customers hiring this product to do?"

      ## Interview Framework
      1. Identify recent purchase or switch decision
      2. Map timeline: First thought → Purchase → First use
      3. Understand pushes (current solution problems)
      4. Understand pulls (new solution attractions)
      5. Identify anxieties and habits holding them back
      6. Understand circumstance that triggered search

      ## Key Insights
      - Jobs have functional, emotional, and social dimensions
      - Circumstances matter more than demographics
      - Customers "hire" products to make progress
      - Competition is any alternative way to get job done
    evidence_links:
      - framework-jtbd-christensen
      - book-competing-against-luck

  - id: system-antifragile-organization
    title: "Antifragile Organization Design"
    description: "Taleb's framework for building systems that gain from disorder"
    status: active
    tags: [resilience, antifragility, risk, taleb]
    content: |
      ## Antifragile vs Resilient
      - Resilient: Withstands shocks, returns to baseline
      - Antifragile: Gets stronger from shocks and volatility

      ## Design Principles
      1. **Optionality**: Multiple paths to success, limited downside
      2. **Small failures**: Many small risks instead of one big one
      3. **Skin in the game**: Decision-makers bear consequences
      4. **Via negativa**: Improve by removing, not adding
      5. **Barbell strategy**: Combine extreme safety + extreme risk

      ## Applications
      - Career: Stable job + side projects with upside
      - Portfolio: 90% safe assets + 10% high-risk
      - Systems: Redundancy and decentralization
    evidence_links:
      - book-antifragile-taleb
      - concept-antifragility

  - id: system-misinformation-detection
    title: "Misinformation Detection Framework"
    description: "Multi-method approach to identifying false information"
    status: active
    tags: [misinformation, fact-checking, information, critical-thinking]
    content: |
      ## Detection Methods
      1. **Source evaluation**: Check author credentials and publisher reputation
      2. **Cross-verification**: Confirm with multiple independent sources
      3. **Temporal analysis**: Check if claim predates supposed evidence
      4. **Logical consistency**: Look for internal contradictions
      5. **Expert fact-checking**: Leverage PolitiFact, Snopes, etc.

      ## Red Flags
      - Emotional manipulation (fear, outrage)
      - Lack of attribution or sources
      - Clickbait headlines mismatching content
      - Poor grammar and formatting
      - Too good/bad to be true

      ## Automated Tools
      - NLP-based content analysis
      - Network analysis of sharing patterns
      - Credibility scoring algorithms
    evidence_links:
      - research-misinformation-detection
      - framework-fact-checking

models:
  - id: model-circle-of-competence
    title: "Circle of Competence"
    description: "Operating within boundaries of deep expertise"
    type: mental-model
    tags: [decision-making, expertise, wisdom, buffett]
    content: |
      ## Core Concept
      Know the boundaries of what you truly understand. Make decisions
      confidently within your circle. Seek expert help outside it.

      ## Application
      - Identify your areas of genuine expertise
      - Recognize when you're outside your circle
      - Don't be intimidated by complexity - focus on what you know
      - Constantly expand circle through deliberate learning
      - The size of your circle doesn't matter; knowing its boundaries does

      ## Warning Signs You're Outside
      - Using jargon you don't deeply understand
      - Can't explain concept to a 12-year-old
      - Relying on others' opinions without own analysis
    evidence_links:
      - quote-buffett-circle-of-competence
      - principle-socratic-ignorance

  - id: model-first-principles
    title: "First Principles Thinking"
    description: "Breaking down problems to fundamental truths and rebuilding"
    type: mental-model
    tags: [reasoning, problem-solving, elon-musk, innovation]
    content: |
      ## Process
      1. Identify and define current assumptions
      2. Break problem down to fundamental truths
      3. Create new solutions from the ground up

      ## Example: Battery Cost
      - Analogy thinking: "Batteries are expensive and always will be"
      - First principles: "What are battery materials? Iron, nickel, carbon..."
      - Result: "Material cost is $80/kWh, not $600/kWh market price"

      ## Applications
      - When stuck using conventional wisdom
      - When everyone says "that's how it's always been done"
      - When creating something truly new
    evidence_links:
      - quote-musk-first-principles
      - theory-aristotle-first-principles

  - id: model-compound-interest
    title: "Compound Interest Mental Model"
    description: "Understanding exponential growth through reinvestment"
    type: mental-model
    tags: [finance, growth, exponential, patience]
    content: |
      ## Core Insight
      Growth on growth leads to exponential, not linear, returns.
      Applies to money, knowledge, relationships, health habits.

      ## Key Factors
      1. Rate of return
      2. Time horizon
      3. Consistency

      ## Applications Beyond Finance
      - Reading: Each book makes next book easier to understand
      - Exercise: Each workout makes next one easier
      - Relationships: Small daily investments compound
      - Learning: Knowledge builds on knowledge
    evidence_links:
      - principle-compound-interest
      - quote-munger-compounding

  - id: model-systems-vs-goals
    title: "Systems vs Goals"
    description: "Focus on processes, not just outcomes"
    type: framework
    tags: [productivity, habits, process, dilbert]
    content: |
      ## Distinction
      - Goal: Lose 20 pounds
      - System: Eat healthy and exercise daily

      ## Why Systems Win
      1. Goals are binary (win/lose), systems are continuous
      2. Goals are future-focused, systems are present-focused
      3. Achieving goal ends motivation, systems maintain it
      4. Systems handle changing circumstances

      ## Application
      Build reliable processes rather than setting ambitious outcomes.
      Trust the process.
    evidence_links:
      - quote-adams-systems-vs-goals
      - theory-atomic-habits

  - id: model-network-effects
    title: "Network Effects"
    description: "Product value increases with each additional user"
    type: concept
    tags: [economics, platforms, networks, strategy]
    content: |
      ## Types
      - **Direct**: More users → more value for all (telephone, social networks)
      - **Indirect**: More users → more complementary products (app stores)
      - **Two-sided**: Platforms matching buyers and sellers (Uber, Airbnb)

      ## Characteristics
      - Strong defense against competitors (moats)
      - Winner-take-most dynamics
      - Critical mass required for takeoff
      - Can create lock-in effects

      ## Strategic Implications
      - First-mover advantage matters
      - Growth over profitability initially
      - Subsidize one side to bootstrap
      - Platform companies valued higher than linear businesses
    evidence_links:
      - research-network-effects
      - concept-metcalfes-law

  - id: model-ai-alignment-problem
    title: "AI Alignment Problem"
    description: "Challenge of ensuring AI systems pursue intended goals"
    type: concept
    tags: [AI, safety, alignment, existential-risk]
    content: |
      ## Core Challenge
      As AI systems become more capable, ensuring they reliably do what
      we want becomes increasingly difficult and critical.

      ## Key Issues
      1. **Goal specification**: Hard to specify what we really want
      2. **Goal stability**: Goals may drift during training/deployment
      3. **Deceptive alignment**: AI may fake alignment while pursuing other goals
      4. **Scalable oversight**: How to supervise superhuman AI?

      ## Current Approaches
      - Constitutional AI
      - Reinforcement learning from human feedback (RLHF)
      - Interpretability research
      - Red-teaming and adversarial testing
    evidence_links:
      - research-ai-alignment-survey
      - research-ai-alignment-deep-learning

  - id: model-circular-economy
    title: "Circular Economy Model"
    description: "Economic system eliminating waste through circularity"
    type: framework
    tags: [sustainability, environment, economics, regenerative]
    content: |
      ## Contrast with Linear Economy
      - Linear: Take → Make → Dispose
      - Circular: Reduce → Reuse → Recycle → Regenerate

      ## Key Concepts
      - Design out waste from the start
      - Keep products and materials in use
      - Regenerate natural systems
      - Decouple economic growth from resource consumption

      ## Business Models
      - Product-as-a-service
      - Sharing platforms
      - Product life extension
      - Resource recovery
      - Biomimicry
    evidence_links:
      - framework-circular-economy-emf
      - research-circular-economy-impact

  - id: model-esg-framework
    title: "ESG (Environmental, Social, Governance)"
    description: "Framework for measuring organizational sustainability and ethics"
    type: framework
    tags: [investing, sustainability, corporate-responsibility]
    content: |
      ## Three Pillars
      **Environmental**: Climate impact, pollution, resource depletion
      **Social**: Labor practices, diversity, community relations
      **Governance**: Board composition, executive pay, shareholder rights

      ## Purpose
      - Identify non-financial risks
      - Align investments with values
      - Drive long-term value creation
      - Meet stakeholder expectations

      ## Criticisms
      - Lack of standardized metrics
      - Potential for greenwashing
      - Uncertain impact on returns
      - Definition varies by provider
    evidence_links:
      - research-esg-performance
      - framework-un-pri

  - id: model-attention-economy
    title: "Attention Economy"
    description: "Economic model where human attention is the scarce resource"
    type: concept
    tags: [economics, technology, social-media, attention]
    content: |
      ## Core Premise
      In information-rich world, attention becomes the bottleneck.
      Tech platforms compete for attention and monetize it through ads.

      ## Mechanisms
      - Infinite scroll and autoplay
      - Notification systems
      - Intermittent variable rewards (likes, messages)
      - Algorithmic content personalization
      - Social proof and FOMO

      ## Consequences
      - Shortened attention spans
      - Increased anxiety and distraction
      - Reduced deep work capacity
      - Attention as product, users as commodity

      ## Origins
      Traces to 1830s when Benjamin Day realized readers could
      be the product sold to advertisers.
    evidence_links:
      - book-digital-minimalism-newport
      - research-attention-economy

  - id: model-deliberate-practice
    title: "Deliberate Practice Model"
    description: "Structured approach to developing expertise through focused training"
    type: mental-model
    tags: [expertise, learning, mastery, performance]
    content: |
      ## Key Principles
      1. Practice is purposeful with specific goals
      2. Focus is intense and sustained
      3. Feedback is immediate and informative
      4. Discomfort is necessary - work at edge of ability

      ## Differs from Naive Practice
      - Mindless repetition doesn't create expertise
      - Time alone doesn't predict performance
      - Enjoyment is not the goal
      - Comfort zone must be exited

      ## Requirements
      - Well-defined field with established experts
      - Access to teachers/coaches
      - Motivation to improve
      - Measurable performance criteria
    evidence_links:
      - research-ericsson-deliberate-practice
      - book-peak-ericsson

  - id: model-antifragility
    title: "Antifragility"
    description: "Property of systems that gain from disorder and stress"
    type: concept
    tags: [resilience, risk, taleb, robustness]
    content: |
      ## Three Categories
      1. **Fragile**: Harmed by volatility (porcelain, centralized systems)
      2. **Robust**: Unaffected by volatility (stone, well-built systems)
      3. **Antifragile**: Benefits from volatility (evolution, markets, muscles)

      ## Key Distinction
      "Antifragility is beyond resilience or robustness. The resilient
      resists shocks and stays the same; the antifragile gets better."

      ## How to Build Antifragility
      - Embrace small, frequent stressors
      - Avoid large, catastrophic risks
      - Maintain optionality
      - Decentralize and redundancy
      - Learn from failures quickly

      ## Examples
      - Immune system (stronger after exposure)
      - Muscles (grow from stress)
      - Start-ups (selection pressure improves ecosystem)
    evidence_links:
      - book-antifragile-taleb
      - concept-antifragility

  - id: model-jobs-to-be-done
    title: "Jobs-to-be-Done Theory"
    description: "Framework understanding why customers buy products"
    type: framework
    tags: [innovation, product, customer-research, christensen]
    content: |
      ## Core Insight
      Customers don't buy products; they "hire" them to get a job done.

      ## Jobs Have Dimensions
      - **Functional**: Core task to be accomplished
      - **Emotional**: How they want to feel
      - **Social**: How they want to be perceived

      ## Key Concepts
      - Circumstances matter more than customer demographics
      - Competition is anything that does the job
      - Solutions are hired and fired
      - Progress, not products, is what customers seek

      ## Example: Milkshake
      Morning commuters hire milkshakes to:
      - Keep them full until lunch (functional)
      - Make boring commute interesting (emotional)
      - Be consumed one-handed while driving (functional)
    evidence_links:
      - framework-jtbd-christensen
      - book-competing-against-luck

  - id: model-platform-economics
    title: "Platform Economics"
    description: "Business model connecting different user groups through technology"
    type: framework
    tags: [platforms, marketplaces, two-sided, strategy]
    content: |
      ## Definition
      Platforms facilitate interactions between distinct groups,
      deriving value from network effects.

      ## Types
      - **Transaction**: Uber, eBay, Airbnb
      - **Innovation**: iOS, Android app stores
      - **Integrated**: Amazon (marketplace + direct sales)
      - **Investment**: Crowdfunding, venture platforms

      ## Critical Success Factors
      1. Solve chicken-and-egg problem (who comes first?)
      2. Manage both sides effectively
      3. Prevent disintermediation
      4. Governance and quality control
      5. Pricing strategy (often subsidize one side)

      ## Winner-Take-Most Dynamics
      Network effects create natural monopolies or duopolies.
    evidence_links:
      - research-network-effects
      - research-two-sided-markets

  - id: model-information-ecosystem
    title: "Information Ecosystem Model"
    description: "Framework for understanding how information flows and mutates"
    type: framework
    tags: [information, misinformation, media, systems]
    content: |
      ## Components
      1. **Sources**: Original creators (journalists, researchers, individuals)
      2. **Amplifiers**: Platforms and influencers
      3. **Consumers**: Audience that receives and shares
      4. **Feedback loops**: Engagement signals shape what spreads

      ## Dynamics
      - Virality favors emotion over accuracy
      - Algorithmic amplification of engagement
      - Echo chambers and filter bubbles
      - Information cascades
      - Context collapse

      ## Health Indicators
      - Source diversity
      - Fact-checking presence
      - Correction mechanisms
      - Transparency
      - Media literacy of participants
    evidence_links:
      - research-misinformation-detection
      - framework-fact-checking

  - id: model-remote-work-effectiveness
    title: "Remote Work Effectiveness Model"
    description: "Framework for understanding distributed work performance"
    type: framework
    tags: [remote-work, productivity, collaboration, future-of-work]
    content: |
      ## Key Factors
      1. **Autonomy**: Trust and outcome-based management
      2. **Communication**: Async-first, over-communicate
      3. **Technology**: Proper tools and infrastructure
      4. **Culture**: Intentional relationship building
      5. **Boundaries**: Work-life separation

      ## Hybrid Model
      - 2-3 days remote optimal for most knowledge work
      - In-person for collaboration, remote for focus
      - Employee choice increases satisfaction
      - No impact on productivity or career progression

      ## Challenges
      - Onboarding and training
      - Spontaneous innovation
      - Social connection
      - Overwork and burnout
    evidence_links:
      - research-stanford-hybrid-work
      - research-bloom-remote-work

  - id: model-digital-minimalism
    title: "Digital Minimalism Philosophy"
    description: "Intentional approach to technology use based on values"
    type: mental-model
    tags: [technology, focus, attention, intentionality]
    content: |
      ## Definition
      "A philosophy of technology use in which you focus your online
      time on a small number of carefully selected and optimized
      activities that strongly support things you value, and then
      happily miss out on everything else."

      ## Core Principles
      1. **Clutter is costly**: Digital tools impose cognitive costs
      2. **Optimization is important**: How you use tech matters
      3. **Intentionality is satisfying**: Deliberate choices beat defaults

      ## Practices
      - Regular digital declutters
      - High-quality leisure activities
      - Face-to-face conversation prioritized
      - Solitude for thinking
      - Delete/redesign phone usage

      ## Opposite of
      - Maximalism: Accept all new tools
      - FOMO-driven adoption
      - Passive consumption
    evidence_links:
      - book-digital-minimalism-newport
      - research-attention-economy

  - id: model-second-order-thinking
    title: "Second-Order Thinking"
    description: "Considering consequences of consequences"
    type: mental-model
    tags: [thinking, decision-making, long-term, consequences]
    content: |
      ## First-Order vs Second-Order
      - First-order: Immediate, obvious consequences
      - Second-order: Consequences of those consequences
      - Third-order and beyond: Ripple effects over time

      ## Application
      Ask: "And then what?" repeatedly
      - Immediate effect
      - What happens next?
      - What are the long-term consequences?
      - Who else is affected and how?

      ## Examples
      - First-order: Eating candy makes you happy
      - Second-order: Leads to weight gain and health issues
      - Third-order: Medical costs, reduced quality of life

      Critical for avoiding unintended consequences.
    evidence_links:
      - book-thinking-in-systems
      - concept-second-order-effects

  - id: model-inversion
    title: "Inversion (Via Negativa)"
    description: "Solve problems by thinking backwards"
    type: mental-model
    tags: [problem-solving, thinking, munger, taleb]
    content: |
      ## Core Idea
      Instead of asking "How do I achieve X?", ask "How do I avoid not-X?"
      Often easier to avoid stupidity than seek brilliance.

      ## Applications
      - Health: What behaviors kill people early? Avoid those.
      - Business: What kills companies? Avoid that.
      - Relationships: What destroys relationships? Don't do that.
      - Investing: Focus on not losing money, gains follow

      ## Munger Quote
      "All I want to know is where I'm going to die, so I'll never go there."

      ## Advantages
      - Removes false paths
      - Highlights critical risks
      - Simplifies complex problems
    evidence_links:
      - quote-munger-inversion
      - concept-via-negativa

  - id: model-pareto-principle
    title: "Pareto Principle (80/20 Rule)"
    description: "80% of effects come from 20% of causes"
    type: principle
    tags: [efficiency, optimization, distribution, pareto]
    content: |
      ## Observation
      Roughly 80% of consequences come from 20% of causes.

      ## Examples
      - 80% of results from 20% of effort
      - 80% of revenue from 20% of customers
      - 80% of bugs from 20% of code
      - 80% of value from 20% of features

      ## Applications
      - Identify high-leverage activities
      - Eliminate low-value work
      - Focus resources on what matters most
      - Ruthless prioritization

      ## Warning
      80/20 is approximate, not exact. Principle is about
      non-uniform distribution, not specific numbers.
    evidence_links:
      - principle-pareto-distribution
      - book-80-20-principle

  - id: model-thinking-fast-slow
    title: "Thinking Fast and Slow (System 1 & 2)"
    description: "Two systems of thought: intuitive and deliberate"
    type: framework
    tags: [psychology, decision-making, kahneman, cognitive-bias]
    content: |
      ## System 1 (Fast)
      - Automatic, intuitive, emotional
      - Pattern recognition, heuristics
      - Low effort, always active
      - Prone to biases

      ## System 2 (Slow)
      - Deliberate, analytical, logical
      - Conscious reasoning
      - High effort, lazy (activates when needed)
      - Can override System 1 (but often doesn't)

      ## Key Insight
      Most decisions made by System 1, checked (poorly) by System 2.
      Understanding when to slow down and engage System 2 is critical.

      ## Common Biases
      - Anchoring, availability, confirmation bias
      - Loss aversion, framing effects
      - Overconfidence
    evidence_links:
      - book-thinking-fast-and-slow
      - research-kahneman-tversky

  - id: model-skin-in-the-game
    title: "Skin in the Game"
    description: "Decision-makers must bear consequences of their decisions"
    type: principle
    tags: [risk, incentives, taleb, accountability]
    content: |
      ## Core Principle
      Those who make decisions should be exposed to the risks/rewards
      of those decisions. No upside without downside.

      ## Why It Matters
      - Aligns incentives with outcomes
      - Prevents hidden asymmetries
      - Filters out bad advice (talkers vs doers)
      - Ensures learning from mistakes

      ## Examples
      - Pilots fly on planes they deem safe
      - CEOs should own significant company stock
      - Consultants vs entrepreneurs
      - Bureaucrats vs small business owners

      ## Absence Creates Problems
      - 2008 financial crisis: Banks risked others' money
      - Principal-agent problems
      - Moral hazard
    evidence_links:
      - book-skin-in-the-game-taleb
      - concept-moral-hazard

  - id: model-opportunity-cost
    title: "Opportunity Cost"
    description: "Cost of best alternative foregone"
    type: concept
    tags: [economics, decision-making, tradeoffs]
    content: |
      ## Definition
      When choosing one option, you forgo all others. The value
      of the best alternative is the opportunity cost.

      ## Key Insight
      "There's no such thing as a free lunch."
      Every choice has a cost, even if not monetary.

      ## Applications
      - Time: Watching TV costs time you could spend learning
      - Money: Buying X means you can't buy Y
      - Career: Choosing job A means not experiencing job B
      - Relationships: Dating X exclusively means not dating Y

      ## Why It's Powerful
      Makes hidden costs visible. Forces consideration of
      alternatives. Prevents "free" thinking.

      Economic reasoning is opportunity cost thinking.
    evidence_links:
      - principle-opportunity-cost
      - book-economics-in-one-lesson

  - id: model-confirmation-bias
    title: "Confirmation Bias"
    description: "Tendency to seek information confirming existing beliefs"
    type: concept
    tags: [psychology, bias, critical-thinking, epistemology]
    content: |
      ## Definition
      People favor information that confirms their preexisting
      beliefs and ignore or discount contradictory evidence.

      ## Mechanisms
      1. Seek confirming evidence
      2. Interpret ambiguous evidence as confirming
      3. Remember confirming evidence better
      4. Discount contradictory evidence

      ## Consequences
      - Polarization and echo chambers
      - Poor decision-making
      - Inability to update beliefs
      - Overconfidence

      ## Countermeasures
      - Actively seek disconfirming evidence
      - Steel-man opposing arguments
      - Red team your own ideas
      - Bayesian updating
    evidence_links:
      - research-kahneman-tversky
      - research-confirmation-bias

  - id: model-survivorship-bias
    title: "Survivorship Bias"
    description: "Focusing on successes while ignoring failures"
    type: concept
    tags: [bias, statistics, critical-thinking]
    content: |
      ## Definition
      Logical error of concentrating on entities that "survived"
      some process while overlooking those that didn't.

      ## Classic Example
      WWII: Analyzing bullet holes on returning planes to add armor.
      Mistake: Should armor where there are NO holes (those planes
      didn't return). Survivorship bias blinded initial analysis.

      ## Common Occurrences
      - Business advice from successful entrepreneurs (ignoring failures)
      - Investment strategies (funds that failed disappear from record)
      - "Secrets of success" (ignoring those who did same and failed)

      ## Countermeasure
      Always ask: "What am I not seeing? Where's the data on failures?"
    evidence_links:
      - concept-survivorship-bias
      - research-statistical-bias

  - id: model-loss-aversion
    title: "Loss Aversion"
    description: "Losses loom larger than equivalent gains"
    type: concept
    tags: [psychology, economics, kahneman, behavioral-economics]
    content: |
      ## Observation
      Pain of losing $100 > pleasure of gaining $100.
      Typically, losses are felt about 2x as strongly as gains.

      ## Implications
      - Risk aversion in gains (prefer sure thing)
      - Risk seeking in losses (gamble to avoid loss)
      - Endowment effect (overvalue what we own)
      - Status quo bias (stick with current state)

      ## Examples
      - Keeping losing stocks hoping to break even
      - Staying in bad job/relationship to avoid loss
      - Refusing fair bets due to loss possibility

      ## Applications
      - Framing: "Save $10" > "Avoid losing $10"
      - Free trials work (people don't want to lose what they have)
    evidence_links:
      - research-kahneman-tversky
      - book-thinking-fast-and-slow

  - id: model-principal-agent-problem
    title: "Principal-Agent Problem"
    description: "Misalignment when one party acts on behalf of another"
    type: concept
    tags: [economics, incentives, governance, agency]
    content: |
      ## Definition
      Occurs when agent (acting for principal) has different
      incentives than principal. Agent may act in self-interest
      at principal's expense.

      ## Examples
      - Shareholders (principal) vs CEO (agent)
      - Patients (principal) vs doctors (agent)
      - Voters (principal) vs politicians (agent)
      - Investors (principal) vs fund managers (agent)

      ## Solutions
      - Monitoring and oversight
      - Align incentives (equity compensation, profit sharing)
      - Reputation and repeat play
      - Skin in the game
      - Transparency and reporting

      ## Why It Matters
      Explains why organizations don't work as intended despite
      everyone being "rational."
    evidence_links:
      - theory-agency-theory
      - concept-moral-hazard

  - id: model-tragedy-of-commons
    title: "Tragedy of the Commons"
    description: "Individual incentives deplete shared resources"
    type: concept
    tags: [economics, game-theory, environment, cooperation]
    content: |
      ## Core Problem
      When resource is shared, individuals benefit from exploiting
      it but costs are distributed to all. Result: overuse and depletion.

      ## Classic Example
      Shared pasture: Each herder adds more sheep (personal benefit),
      but overgrazing hurts everyone. Rational individual behavior
      leads to collective disaster.

      ## Modern Examples
      - Overfishing
      - Climate change (atmosphere as commons)
      - Traffic congestion
      - Open source maintainer burnout

      ## Solutions
      - Private property rights
      - Government regulation
      - Community self-governance
      - Social norms and ostracism
    evidence_links:
      - paper-tragedy-of-commons
      - research-elinor-ostrom

  - id: model-creative-destruction
    title: "Creative Destruction"
    description: "Innovation destroys old industries while creating new ones"
    type: concept
    tags: [economics, innovation, schumpeter, capitalism]
    content: |
      ## Schumpeter's Concept
      Capitalism's essential process: new innovations continually
      revolutionize economic structure from within, destroying
      old structures while creating new ones.

      ## Examples
      - Cars destroyed horse-carriage industry
      - Digital photography destroyed film
      - Streaming destroyed video rental
      - Smartphones destroyed cameras, GPS, music players

      ## Implications
      - Progress requires destruction
      - Resistance is futile long-term
      - Incumbents often can't adapt
      - Economy constantly renewing itself

      ## For Businesses
      Disrupt yourself or be disrupted. Innovator's dilemma.
    evidence_links:
      - book-capitalism-socialism-democracy
      - concept-schumpeter-innovation

  - id: model-moats
    title: "Economic Moats (Competitive Advantages)"
    description: "Sustainable competitive advantages protecting businesses"
    type: framework
    tags: [strategy, business, buffett, competition]
    content: |
      ## Definition (Buffett)
      Durable competitive advantages that protect a business from
      competitors, like a moat protecting a castle.

      ## Types of Moats
      1. **Network effects**: Value increases with users
      2. **Brand**: Customer loyalty and pricing power
      3. **Cost advantages**: Economies of scale, unique assets
      4. **Switching costs**: Expensive/painful to switch
      5. **Regulatory**: Licenses, patents, regulations

      ## Why Moats Matter
      - Enable sustained profitability
      - Protect from competition
      - Allow pricing power
      - Create long-term value

      ## Moat Analysis
      Ask: What prevents competitors from taking market share?
    evidence_links:
      - concept-economic-moats
      - quote-buffett-moats

  - id: model-ikigai
    title: "Ikigai (Reason for Being)"
    description: "Japanese concept of finding purpose at intersection of passions and skills"
    type: framework
    tags: [purpose, career, fulfillment, japanese-philosophy]
    content: |
      ## Four Circles
      1. What you **love**
      2. What you're **good at**
      3. What the world **needs**
      4. What you can be **paid for**

      ## Intersections
      - Love + Good at = Passion
      - Good at + Paid = Profession
      - Paid + Needed = Vocation
      - Needed + Love = Mission

      ## Ikigai (Center)
      Sweet spot where all four overlap: purpose, fulfillment,
      sustainable livelihood, contribution to world.

      ## Application
      Career planning, life direction, fulfillment assessment.
    evidence_links:
      - concept-ikigai
      - book-ikigai-japanese

  - id: model-ooda-loop
    title: "OODA Loop"
    description: "Decision cycle: Observe, Orient, Decide, Act"
    type: framework
    tags: [decision-making, strategy, military, agility]
    content: |
      ## Four Stages (Boyd)
      1. **Observe**: Gather information from environment
      2. **Orient**: Analyze and synthesize using mental models
      3. **Decide**: Determine course of action
      4. **Act**: Execute decision

      ## Key Insight
      Iterate faster than your opponent. Speed of loop matters
      more than perfection of any stage.

      ## Applications
      - Military strategy (original use)
      - Business competition
      - Sports
      - Personal decision-making

      ## Competitive Advantage
      Whoever cycles through OODA loop faster gains advantage.
      Disrupting opponent's loop is powerful strategy.
    evidence_links:
      - framework-ooda-loop-boyd
      - concept-strategic-agility

  - id: model-eisenhower-matrix
    title: "Eisenhower Matrix (Urgent/Important)"
    description: "Prioritization framework for task management"
    type: framework
    tags: [productivity, prioritization, time-management, eisenhower]
    content: |
      ## Four Quadrants
      1. **Urgent + Important**: Do immediately (crises)
      2. **Not Urgent + Important**: Schedule (strategy, growth)
      3. **Urgent + Not Important**: Delegate (interruptions)
      4. **Not Urgent + Not Important**: Eliminate (time wasters)

      ## Key Insight
      Most people spend too much time in Quadrants 1 & 3,
      not enough in Quadrant 2. Quadrant 2 is where success happens.

      ## Application
      Classify all tasks. Ruthlessly eliminate Q4, delegate Q3,
      minimize Q1, maximize Q2.

      ## Quote (Eisenhower)
      "What is important is seldom urgent and what is urgent
      is seldom important."
    evidence_links:
      - concept-eisenhower-matrix
      - quote-eisenhower-urgency

