    content: |
      Working memory can hold 4±1 items simultaneously. Cognitive load
      comes in three types:
      1. Intrinsic: inherent difficulty of material
      2. Extraneous: poor presentation/design
      3. Germane: processing that builds schemas

      GTD works because it reduces extraneous cognitive load by
      externalizing memory into a trusted system.

